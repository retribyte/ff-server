services:
  ff-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: ff_api
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    ports:
      - "3000:3000"
    networks:
      - app-network

  db:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
